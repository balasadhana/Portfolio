<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Contact | Sadhana B | Full-Stack Developer</title>
  <meta name="description" content="Get in touch with Sadhana B for MERN Stack developer roles, internship opportunities, or freelance collaboration inquiries.">
  
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- --- Sticky Floating Navigation --- -->
  <nav class="header-nav" id="main-nav" aria-label="Main Navigation">
    <ul class="nav-links-list" role="menubar">
      <li class="nav-link-item" role="none">
        <a href="../" role="menuitem">Home</a>
      </li>
      <li class="nav-link-item" role="none">
        <a href="../projects/" role="menuitem">Projects</a>
      </li>
    </ul>
    <div class="nav-divider"></div>
    <span class="btn btn-primary btn-hide-mobile" style="opacity: 0.5; cursor: default;">
      Contact Active
    </span>
  </nav>

  <!-- --- Redesigned Centered Contact Form --- -->
  <main class="container" style="padding-top: 8rem; padding-bottom: 4rem;">
    <div class="contact-centered-wrapper">
      
      <!-- Pill Badge -->
      <div class="contact-reveal-item delay-1" style="text-align: left;">
        <span class="contact-badge-pill">Let's collaborate</span>
      </div>

      <!-- Heading -->
      <h1 class="contact-reveal-item delay-2 contact-heading-title" style="text-align: left; margin-top: 0.5rem; margin-bottom: 1rem;">
        Get in <span class="text-gradient">Touch</span>
      </h1>

      <!-- Subtitle Description -->
      <p class="contact-reveal-item delay-3 heading-desc-text" style="text-align: left; max-width: 100%; margin-top: 0.5rem; margin-bottom: 0;">
        Have a project in mind or just want to say hello? I'd love to hear from you.
      </p>

      <!-- Divider line -->
      <div class="contact-reveal-item delay-4 contact-heading-divider"></div>

      <!-- Form Card Side (Transparent layout) -->
      <div class="contact-reveal-item delay-5 contact-form-side" style="position: relative;">
        
        <!-- Form Success Screen Overlay -->
        <div class="form-success-card-overlay" aria-live="polite">
          <div class="success-check-icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 800;">Message Sent!</h3>
          <p style="color: var(--text-secondary); font-size: 0.9375rem; max-width: 320px; margin: 0 auto;">
            Thank you for reaching out. I will review your inquiry and reply within 24 hours.
          </p>
        </div>

        <!-- Form Element -->
        <form id="contact-form" novalidate>
          <div class="form-inputs-group">
            
            <!-- Two column row: Name & Email -->
            <div class="contact-form-row">
              <!-- Full Name -->
              <div class="form-field-wrapper">
                <label for="contact-name" class="form-field-label">Full Name</label>
                <div class="contact-input-container">
                  <svg class="contact-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                  <input type="text" id="contact-name" class="form-text-input" placeholder="Your name" required>
                </div>
                <span class="form-field-error" aria-live="polite"></span>
              </div>

              <!-- Email Address -->
              <div class="form-field-wrapper">
                <label for="contact-email" class="form-field-label">Email Address</label>
                <div class="contact-input-container">
                  <svg class="contact-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                  </svg>
                  <input type="email" id="contact-email" class="form-text-input" placeholder="your@email.com" required>
                </div>
                <span class="form-field-error" aria-live="polite"></span>
              </div>
            </div>

            <!-- Subject -->
            <div class="form-field-wrapper">
              <label for="contact-subject" class="form-field-label">Subject</label>
              <div class="contact-input-container">
                <svg class="contact-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <input type="text" id="contact-subject" class="form-text-input" placeholder="What's this about?" required>
              </div>
              <span class="form-field-error" aria-live="polite"></span>
            </div>

            <!-- Message -->
            <div class="form-field-wrapper">
              <label for="contact-message" class="form-field-label">Your Message</label>
              <div class="contact-input-container">
                <svg class="contact-input-icon textarea-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <textarea id="contact-message" class="form-textarea-input" placeholder="Tell me what's on your mind..." required></textarea>
              </div>
              <span class="form-field-error" aria-live="polite"></span>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-contact-submit" style="margin-top: 2rem;">
            Send Message
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>

    </div>
  </main>

  <!-- --- Footer Area --- -->
  <footer class="container scroll-reveal">
    <div class="footer-divider-line"></div>
    <div class="footer-bottom-row">
      <div>&copy; 2026 <span style="color:#a78bfa; font-weight:600;">Sadhana B</span>. All rights reserved.</div>
      <div class="footer-social-icons">
        <a href="https://github.com/balasadhana" target="_blank" rel="noopener" class="footer-social-link" aria-label="Sadhana B GitHub Profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
            <path d="M9 18c-4.51 2-5-2-7-2"></path>
          </svg>
        </a>
        <a href="https://www.linkedin.com/in/sadhana-b-57a847283/" target="_blank" rel="noopener" class="footer-social-link" aria-label="Sadhana B LinkedIn Profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
            <rect x="2" y="9" width="4" height="12"></rect>
            <circle cx="4" cy="4" r="2"></circle>
          </svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
